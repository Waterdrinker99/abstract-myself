# Generated by Linnet Setup Wizard

display_order:
  - github_trending
  - arxiv
  - supervisor_updates

hitokoto:
  enabled: false

quote_of_day:
  enabled: false

weather:
  enabled: false

arxiv:
  enabled: true

hacker_news:
  enabled: true

github_trending:
  enabled: true

postdoc_jobs:
  enabled: false

supervisor_updates:
  enabled: true

language: zh

llm:
  provider: openrouter
  scoring_model: google/gemini-2.5-flash-lite-preview-09-2025
  summarization_model: google/gemini-2.5-flash-lite-preview-09-2025
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: OPENROUTER_API_KEY
  prompts:
    arxiv_score: |
      Rate this arXiv paper's relevance to the following research topics:
      tribology, kinetic friction, sliding friction, contact mechanics,
      sliding electrification, triboelectric effect, contact electrification,
      surface charging, droplet motion, wetting dynamics, TENG
      (triboelectric nanogenerator), soft matter surface science,
      and materials with functional surface properties.

      Title: {title}
      Abstract: {abstract}

      Reply with ONLY a single integer 0-10. No explanation.
      10 = directly about one or more of the above topics.
      0 = completely unrelated.

pages:
  base_url: ""

weekly:
  github_trending:
    enabled: true
    top_n: 5
  arxiv:
    enabled: true
    top_n: 5
  supervisor_updates:
    enabled: true
    top_n: 5

monthly:
  github_trending:
    enabled: true
    top_n: 5
  arxiv:
    enabled: true
    top_n: 10
  supervisor_updates:
    enabled: true
    top_n: 5

sinks:
  slack:
    enabled: false
    # Add SLACK_WEBHOOK_URL as a GitHub Actions secret
    max_papers: 5
    max_github: 3
  serverchan:
    enabled: false
    # Add SERVERCHAN_SENDKEY as a GitHub Actions secret
    max_papers: 5
    max_github: 3